


<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>farmstory::main</title>
    </head>
    <link rel="stylesheet" href="login.css">
    <body>
        <div id="container">
            <header>
                <!-- 로고 -->
                <a href="#" class="logo"><img src="../../images/logo.png" alt="메인로고"></a>
                <!-- 오른쪽 상단 메뉴 -->
                <p>
                    <a href="#">HOME</a>
                    <a href="#">로그인</a>
                    <a href="#">회원가입</a>
                    <a href="#">관리자</a>
                    <a href="#">고객센터</a>
                </p>

                <!-- 오른쪽 테스트 배너 -->
                <img class="text" src="../../images/head_txt_img.png" alt="3만원이상 무료배송">
                
                <!-- 메인 메뉴(GNB) -->
                <ul class="gnb">
                    <li><a href="#">팜스토리소개</a></li>
                    <li><a href="#">장보기</a></li>
                    <li><a href="#">농작물이야기</a></li>
                    <li><a href="#">이벤트</a></li>
                    <li><a href="#">커뮤니티</a></li>
                </ul>

            </header>

    <main>
                
        <section class="login">
            <form action="#" method="post">

                <!-- 로그인 입력 영역 -->
                <div class="login-box">

                    <div class="input-box">

                        <div>
                            <img src="../../images/user/login_ico_id.png" alt="아이디">
                            <input type="text" name="uid" placeholder="아이디 입력">
                        </div>

                        <div>
                            <img src="../../images/user/login_ico_pw.png" alt="비밀번호">
                            <input type="password" name="pass" placeholder="비밀번호 입력">
                        </div>

                    </div>

                    <button type="submit">로그인</button>

                </div>

            </form>

            <!-- 아래 안내 박스 -->
            <div class="login-info">

                <h4>회원 로그인 안내</h4>

                <p>
                    아직 회원이 아니시면 회원으로 가입하세요.
                </p>

                <div class="login-link">
                    <a href="#">아이디 | 비밀번호찾기 | </a>
                    <a href="#">회원가입</a>
                </div>

            </div>

        </section>

</main>
